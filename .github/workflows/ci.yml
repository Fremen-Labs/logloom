# LogLoom CI — Build and test the LogLoom knowledge graph engine.
# This workflow runs on every push and PR to validate the full test suite,
# build the graph from its own codebase, and lint for untracked log sites.

name: LogLoom CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Core test suite ─────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build,dev]"
          # Install multi-language grammars for full coverage
          pip install tree-sitter-go tree-sitter-typescript tree-sitter-javascript

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=logloom --cov-report=term-missing

      - name: Type check
        if: matrix.python-version == '3.12'
        run: mypy src/logloom --ignore-missing-imports || true

  # ── Self-dogfooding: build the graph from our own codebase ──────────────────
  graph-build:
    name: Build LogLoom Graph (Self-Test)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install LogLoom
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
          pip install tree-sitter-go tree-sitter-typescript tree-sitter-javascript

      - name: Build graph
        run: |
          logloom build \
            --source src/ \
            --output logloom-graph.json \
            --languages python \
            --git \
            --tags \
            --call-graph \
            --verbose

      - name: Show stats
        run: logloom graph stats --graph-path logloom-graph.json

      - name: Lint (non-strict)
        run: logloom lint --source src/ --graph-path logloom-graph.json

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: logloom-graph
          path: logloom-graph.json
          retention-days: 30

  # ── Multi-language scanner validation ───────────────────────────────────────
  multi-lang:
    name: Multi-Language Scanners
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build,dev]"
          pip install tree-sitter-go tree-sitter-typescript tree-sitter-javascript

      - name: Run Go scanner tests
        run: pytest tests/unit/test_go_scanner.py -v

      - name: Run TypeScript scanner tests
        run: pytest tests/unit/test_ts_scanner.py -v

      - name: Build Go fixture graph
        run: |
          logloom build \
            --source tests/fixtures/ \
            --output go-graph.json \
            --languages go \
            --no-git --no-call-graph

      - name: Build TypeScript fixture graph
        run: |
          logloom build \
            --source tests/fixtures/ \
            --output ts-graph.json \
            --languages typescript \
            --no-git --no-call-graph
