name: Automate PyPI Release via ReleaseFlow

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write  # Required for PyPI Trusted Publishing (OIDC)

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Quality gate ────────────────────────────────────────────────────────────
  validate:
    name: Quality Gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build,dev]"
          # Install multi-language grammars for full test coverage
          pip install tree-sitter-go tree-sitter-typescript tree-sitter-javascript

      - name: Code Quality — Ruff Linter
        if: matrix.python-version == '3.12'
        run: ruff check src/logloom/ --select E,F,W || true

      - name: Code Quality — Black Formatter
        if: matrix.python-version == '3.12'
        run: black --check src/logloom/ || true

      - name: Run full test suite
        run: pytest tests/ -v --tb=short --cov=logloom --cov-report=term-missing

      - name: Security — Dependency Audit
        if: matrix.python-version == '3.12'
        run: |
          pip install pip-audit
          pip-audit || true

  # ── Build and publish ───────────────────────────────────────────────────────
  release:
    name: Build, Scan, and Publish
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for changelog generation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run ReleaseFlow Generator
        id: rflow
        env:
          RFLOW_ADO_PAT: ${{ secrets.RFLOW_ADO_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RFLOW_AI_PROVIDER: "gemini"
        run: |
          # 1. Install ReleaseFlow CLI from Azure DevOps
          echo "Fetching ReleaseFlow binary directly from Azure DevOps Artifacts..."
          ORG="mentat-automation"
          PROJECT="vorsam"
          
          echo "Since we are bypassing the bash install.sh, we will clone the rflow repo and build it locally in the runner to guarantee architecture compatibility."
          
          # We will clone the releaseflow repo using the PAT
          git clone -b master https://$RFLOW_ADO_PAT@dev.azure.com/$ORG/$PROJECT/_git/ReleaseFlow /tmp/ReleaseFlow
          cd /tmp/ReleaseFlow
          
          # Build the rflow binary
          echo "Building rflow from source..."
          make build
          
          # Move to path
          sudo cp bin/rflow /usr/local/bin/rflow
          sudo chmod +x /usr/local/bin/rflow
          
          # Verify
          rflow version
          
          # Move back to workspace
          cd $GITHUB_WORKSPACE
          
          # 2. Install Dependencies (Syft for SBOM, Trivy for Scans)
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          
          # 3. Bootstrap Version and Generate Manifest
          # Extract current version from pyproject.toml since it's the source of truth
          CURRENT_VERSION=$(grep "^version =" pyproject.toml | awk -F'"' '{print $2}')
          echo "$CURRENT_VERSION" > .version
          echo "Extracted $CURRENT_VERSION from pyproject.toml. Triggering ReleaseFlow bump..."
          
          rflow manifest generate --config release.yaml --app-dir . --bump patch
          
          # Extract the new version written to .version by rflow
          VERSION=$(cat .version)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          # Generate SBOM
          rflow sbom generate --manifest manifests/release-manifest.yaml
          
          # Scan for vulnerabilities
          rflow scan directory --manifest manifests/release-manifest.yaml
          
          # Generate Release Notes
          # We will use ReleaseFlow's AI notes generator to parse commit history for this version
          rflow notes generate --version $VERSION --out-external release-notes.md --ai

      - name: Sync Version and Build Package
        run: |
          # Update pyproject.toml dynamically
          sed -i "s/^version = \".*\"/version = \"${{ env.VERSION }}\"/" pyproject.toml
          # Update __version__.py dynamically
          sed -i "s/__version__ = \".*\"/__version__ = \"${{ env.VERSION }}\"/" src/logloom/__version__.py
          
          # Commit the version bump back to the repository so subsequent runs do not stick on old versions
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/logloom/__version__.py
          # Use || true to prevent failure if it's already committed (e.g. manual bump)
          git commit -m "chore(release): bump version to ${{ env.VERSION }} [skip ci]" || true
          git push origin main || true
          
          # Build wheel and sdist
          python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body_path: release-notes.md
          files: |
            security/sbom/*
            security/scans/*
            dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m twine upload --skip-existing dist/*
